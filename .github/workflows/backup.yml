name: 备份 Deep Forest Club Wiki

on:
  # 定时触发：每天凌晨2点运行
  schedule:
    - cron: '0 2 * * *'
  
  # 允许手动触发
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      
    - name: 安装 HTTrack
      run: |
        sudo apt-get update
        sudo apt-get install -y httrack webhttrack
        
    - name: 创建备份目录
      run: |
        mkdir -p backups/deep-forest-club
        mkdir -p backups/archive
        
    - name: 设置日期变量
      id: date
      run: |
        echo "date=$(date +'%Y%m%d_%H%M%S')" >> $GITHUB_OUTPUT
        echo "year=$(date +'%Y')" >> $GITHUB_OUTPUT
        echo "month=$(date +'%m')" >> $GITHUB_OUTPUT
        echo "day=$(date +'%d')" >> $GITHUB_OUTPUT
        
    - name: 执行 HTTrack 备份
      run: |
        cd backups/deep-forest-club
        
        # 使用 HTTrack 镜像网站
        httrack "https://deep-forest-club.wikidot.com/" \
          -O "./${{ steps.date.outputs.date }}" \
          --mirror \
          --depth=3 \
          --max-files=0 \
          --connection-per-second=5 \
          --sockets=5 \
          --retries=3 \
          --timeout=60 \
          --robots=0 \
          --index \
          --display \
          --verbose \
          --debug-log \
          --continue \
          --keep-links \
          --can-go-up \
          --ext-depth=0 \
          --url-charset="UTF-8" \
          --iso8859-1 \
          --assume \
          --do-not-recatch \
          --include-query-string \
          --http-10 \
          --disable-security-limits \
          --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/91.0.4472.124 Safari/537.36"
          
        echo "备份完成: ${{ steps.date.outputs.date }}"
        
    - name: 压缩备份文件
      run: |
        cd backups/deep-forest-club
        tar -czf "../archive/deep-forest-club-${{ steps.date.outputs.date }}.tar.gz" "./${{ steps.date.outputs.date }}"
        
    - name: 生成备份信息
      run: |
        cd backups/archive
        echo "# 备份信息" > backup_info.md
        echo "备份时间: ${{ steps.date.outputs.date }}" >> backup_info.md
        echo "备份大小: $(du -sh deep-forest-club-${{ steps.date.outputs.date }}.tar.gz | cut -f1)" >> backup_info.md
        echo "文件列表:" >> backup_info.md
        tar -tzf deep-forest-club-${{ steps.date.outputs.date }}.tar.gz | head -20 >> backup_info.md
        
    - name: 提交备份到仓库
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # 只提交 archive 目录下的内容
        git add backups/archive/deep-forest-club-*.tar.gz
        git add backups/archive/backup_info.md
        
        # 检查是否有文件需要提交
        if git diff --staged --quiet; then
          echo "没有新的备份文件需要提交"
        else
          git commit -m "备份 Deep Forest Club Wiki - ${{ steps.date.outputs.date }}"
          git push
        fi
        
    - name: 清理旧备份（保留最近30天的备份）
      run: |
        cd backups/archive
        # 列出所有备份文件，按时间排序，删除30天前的文件
        find . -name "deep-forest-club-*.tar.gz" -type f -mtime +30 -delete
        
    - name: 上传备份文件作为工作流附件
      uses: actions/upload-artifact@v4
      with:
        name: deep-forest-club-backup-${{ steps.date.outputs.date }}
        path: backups/archive/deep-forest-club-${{ steps.date.outputs.date }}.tar.gz
        retention-days: 30
        
    - name: 发送备份通知（可选）
      if: always()
      run: |
        if [ ${{ job.status }} == 'success' ]; then
          echo "✅ 备份成功完成"
        else
          echo "❌ 备份失败"
        fi