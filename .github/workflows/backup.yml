name: Website Backup and Upload

on:
  schedule:
    # 每周日凌晨2点运行备份（UTC时间），减少频率
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      description:
        description: '手动备份描述'
        required: false
        default: 'Manual backup'

env:
  BACKUP_DIR: 'backups'
  MAX_BACKUPS: 10  # 保留最近10个备份

jobs:
  backup:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0
        
    - name: Clean old backups
      run: |
        # 删除超过保留数量的旧备份
        ls -t *.tar.gz | tail -n +$((MAX_BACKUPS + 1)) | xargs -r rm -f
        
    - name: Install HTTrack
      run: |
        sudo apt-get update
        sudo apt-get install -y httrack
        
    - name: Create backup directory
      run: mkdir -p ${{ env.BACKUP_DIR }}
      
    - name: Run HTTrack backup
      run: |
        httrack "https://deep-forest-club.wikidot.com" \
          -O ./${{ env.BACKUP_DIR }} \
          -%v \
          -r2 \
          -N "%h%p/%n.%t" \
          -#L1000 \
          --robots=0 \
          --timeout=30 \
          --retries=3
      timeout-minutes: 30
      
    - name: Compress backup
      run: |
        TIMESTAMP=$(date +%Y%m%d-%H%M%S)
        tar -czf "backup-${TIMESTAMP}.tar.gz" ${{ env.BACKUP_DIR }}/
        rm -rf ${{ env.BACKUP_DIR }}
        echo "BACKUP_FILE=backup-${TIMESTAMP}.tar.gz" >> $GITHUB_ENV
        
    - name: Configure Git
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
    - name: Check for changes
      id: changes
      run: |
        git status --porcelain
        if [ -n "$(git status --porcelain)" ]; then
          echo "has_changes=true" >> $GITHUB_OUTPUT
        else
          echo "has_changes=false" >> $GITHUB_OUTPUT
        fi
        
    - name: Commit and push backup
      if: steps.changes.outputs.has_changes == 'true'
      run: |
        git add *.tar.gz
        git commit -m "🔧 Backup: ${{ github.event.inputs.description || 'Automated backup' }} [skip ci]"
        git push origin main
