name: Multiple Websites Backup - Optimized

on:
  schedule:
    - cron: '0 2 * * 0'  # жҜҸе‘Ёж—ҘеҮҢжҷЁ2зӮ№
  workflow_dispatch:
    inputs:
      description:
        description: 'жүӢеҠЁеӨҮд»ҪжҸҸиҝ°'
        required: false
        default: 'Manual backup'

env:
  MAX_BACKUPS_PER_SITE: 5
  DEFAULT_DEPTH: 2
  DEFAULT_TIMEOUT: 30
  
  # дҝ®еӨҚпјҡдҪҝз”ЁжӯЈзЎ®зҡ„YAMLеӨҡиЎҢеӯ—з¬ҰдёІж јејҸ
  SITES_CONFIG: |
    {
      "sites": [
        {
          "name": "deep-forest",
          "url": "https://deep-forest-club.wikidot.com",
          "folder": "backups/deep-forest",
          "description": "ж·ұжһ—ж–ҮеӯҰйғЁдё»з«ҷ"
        },
        {
          "name": "example-site",
          "url": "https://example.com", 
          "folder": "backups/example",
          "depth": 1,
          "timeout": 15
        }
      ]
    }

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0
        
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y httrack jq
        
    - name: Initialize backup environment
      run: |
        mkdir -p temp-backups
        echo "BACKUP_START_TIME=$(date +%s)" >> $GITHUB_ENV
        
    - name: Process each website
      id: backup-sites
      run: |
        success_count=0
        # дҝ®еӨҚпјҡдҪҝз”ЁжӯЈзЎ®зҡ„JSONи§Јжһҗж–№ејҸ
        total_count=$(echo '$SITES_CONFIG' | jq '.sites | length')
        
        echo '$SITES_CONFIG' | jq -c '.sites[]' | while read site; do
          name=$(echo "$site" | jq -r '.name')
          url=$(echo "$site" | jq -r '.url')
          folder=$(echo "$site" | jq -r '.folder')
          depth=$(echo "$site" | jq -r ".depth // $DEFAULT_DEPTH")
          timeout=$(echo "$site" | jq -r ".timeout // $DEFAULT_TIMEOUT")
          
          echo "рҹ”№ ејҖе§ӢеӨҮд»Ҫ: $name ($url)"
          
          # еҲӣе»әдёҙж—¶зӣ®еҪ•
          mkdir -p "temp-backups/$name"
          
          # жү§иЎҢеӨҮд»Ҫ
          if httrack "$url" \
            -O "temp-backups/$name" \
            -%v \
            -r$depth \
            -N "%h%p/%n.%t" \
            -#L1000 \
            --robots=0 \
            --timeout=$timeout \
            --retries=2; then
            
            # еҺӢзј©еӨҮд»Ҫ
            TIMESTAMP=$(date +%Y%m%d-%H%M%S)
            tar -czf "backup-${name}-${TIMESTAMP}.tar.gz" "temp-backups/$name/"
            
            echo "вң… еӨҮд»Ҫе®ҢжҲҗ: $name"
            success_count=$((success_count + 1))
          else
            echo "вқҢ еӨҮд»ҪеӨұиҙҘ: $name"
          fi
          
          # жё…зҗҶдёҙж—¶ж–Үд»¶
          rm -rf "temp-backups/$name"
        done
        
        echo "success_count=$success_count" >> $GITHUB_OUTPUT
        echo "total_count=$total_count" >> $GITHUB_OUTPUT
        
    - name: Clean old backups
      run: |
        # дёәжҜҸдёӘзҪ‘з«ҷжё…зҗҶж—§ж–Үд»¶
        echo '$SITES_CONFIG' | jq -c '.sites[]' | while read site; do
          name=$(echo "$site" | jq -r '.name')
          echo "жё…зҗҶж—§еӨҮд»Ҫ: $name (дҝқз•ҷжңҖиҝ‘$MAX_BACKUPS_PER_SITEдёӘ)"
          ls -t backup-${name}-*.tar.gz 2>/dev/null | \
            tail -n +$((MAX_BACKUPS_PER_SITE + 1)) | \
            xargs -r rm -f
        done
        
    - name: Generate backup report
      if: always()
      run: |
        END_TIME=$(date +%s)
        DURATION=$((END_TIME - BACKUP_START_TIME))
        
        echo "рҹ“Ҡ еӨҮд»ҪжҠҘе‘Ҡ:"
        echo "   жҲҗеҠҹ: ${{ steps.backup-sites.outputs.success_count }}/${{ steps.backup-sites.outputs.total_count }}"
        echo "   иҖ—ж—¶: ${DURATION}з§’"
        
    - name: Configure Git
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
    - name: Check for changes
      id: changes
      run: |
        git status --porcelain
        if [ -n "$(git status --porcelain)" ]; then
          echo "has_changes=true" >> $GITHUB_OUTPUT
        else
          echo "has_changes=false" >> $GITHUB_OUTPUT
        fi
        
    - name: Commit and push backups
      if: steps.changes.outputs.has_changes == 'true'
      run: |
        git add *.tar.gz
        git commit -m "рҹ”§ Multi-site backup: ${{ github.event.inputs.description || 'Automated backup' }} [skip ci]"
        git push origin main
