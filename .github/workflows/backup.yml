name: Website Backup with HTTrack (Optimized)

# 触发条件：每天凌晨2点执行，也支持手动触发
on:
  schedule:
    # cron 表达式：分 时 日 月 周 (UTC时间，北京时间需要+8小时)
    - cron: '0 18 * * *'  # 对应北京时间凌晨2点
  workflow_dispatch:  # 允许手动触发

# 设置权限
permissions:
  contents: write  # 允许推送代码到仓库

jobs:
  backup-website:
    runs-on: ubuntu-latest
    steps:
      # 步骤1：检出仓库代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 步骤2：安装HTTrack和依赖工具
      - name: Install HTTrack and tools
        run: |
          sudo apt update
          sudo apt install -y httrack wget curl grep

      # 步骤3：预检查核心页面可用性
      - name: Check core page availability
        run: |
          CORE_PAGE="https://deep-forest-club.wikidot.com/system:list-all-pages"
          # 检查页面是否可访问
          if curl --head --fail --silent "$CORE_PAGE" > /dev/null; then
            echo "✅ Core page is accessible"
          else
            echo "❌ Core page is not accessible, exiting"
            exit 1
          fi

      # 步骤4：优化版HTTrack备份（优先核心页面）
      - name: Optimized backup with HTTrack
        run: |
          # 创建备份目录
          BACKUP_DATE=$(date +%Y%m%d)
          BACKUP_BASE_DIR="./website-backups"
          BACKUP_DIR="${BACKUP_BASE_DIR}/deep-forest-club-${BACKUP_DATE}"
          mkdir -p "${BACKUP_DIR}"
          
          # HTTrack优化配置 - 优先抓取核心页面
          httrack "https://deep-forest-club.wikidot.com/system:list-all-pages" \
            -O "${BACKUP_DIR}" \
            --mirror \
            --robots=0 \
            --depth=10 \
            --stay-on-same-domain \
            --stay-on-same-server \
            --keep-alive \
            --timeout=120 \
            --retries=5 \
            --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            --priority=1 \
            --scan-level=3 \
            --verbose \
            --log="${BACKUP_DIR}/httrack-log.txt"
          
          # 验证核心页面是否备份成功
          if [ -f "${BACKUP_DIR}/deep-forest-club.wikidot.com/system:list-all-pages.html" ]; then
            echo "✅ Core page backup successful"
            # 显示核心页面大小，确认完整性
            ls -lh "${BACKUP_DIR}/deep-forest-club.wikidot.com/system:list-all-pages.html"
          else
            echo "❌ Core page backup failed"
            exit 1
          fi
          
          # 查看备份概览
          echo "📊 Backup summary:"
          ls -la "${BACKUP_DIR}/" | wc -l
          du -sh "${BACKUP_DIR}"

      # 步骤5：压缩备份文件（带校验）
      - name: Compress and verify backup
        run: |
          BACKUP_DATE=$(date +%Y%m%d)
          BACKUP_DIR="./website-backups/deep-forest-club-${BACKUP_DATE}"
          TAR_FILE="${BACKUP_DIR}.tar.gz"
          
          # 压缩并计算MD5
          tar -zcvf "${TAR_FILE}" "${BACKUP_DIR}"
          md5sum "${TAR_FILE}" > "${TAR_FILE}.md5"
          
          # 验证压缩包
          md5sum -c "${TAR_FILE}.md5"
          
          # 删除原目录，只保留压缩包和校验文件
          rm -rf "${BACKUP_DIR}"
          
          # 显示最终文件
          echo "📁 Final backup files:"
          ls -la ./website-backups/

      # 步骤6：智能提交（只在文件有变化时提交）
      - name: Smart commit and push
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          # 检查是否有新的有效备份文件
          BACKUP_FILES=$(ls -A ./website-backups/*.tar.gz 2>/dev/null)
          if [ -n "${BACKUP_FILES}" ]; then
            # 检查文件大小（排除空文件）
            FILE_SIZE=$(du -k "${BACKUP_FILES}" | cut -f1)
            if [ "${FILE_SIZE}" -gt 100 ]; then  # 至少100KB才提交
              git add ./website-backups/*
              # 检查是否有实际变更
              if git diff --cached --quiet; then
                echo "ℹ️ No changes to commit"
              else
                git commit -m "Backup deep-forest-club.wikidot.com (core: system:list-all-pages) ${BACKUP_DATE}"
                git push
                echo "✅ Backup pushed successfully"
              fi
            else
              echo "❌ Backup file too small (${FILE_SIZE}KB), skipping commit"
            fi
          else
            echo "❌ No backup files found"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BACKUP_DATE: ${{ github.run_id }}-${{ github.run_number }}

      # 步骤7：清理旧备份（可选，保留最近30天）
      - name: Cleanup old backups (keep last 30 days)
        run: |
          cd ./website-backups
          # 按时间排序，删除30天前的备份
          find . -name "deep-forest-club-*.tar.gz" -type f -mtime +30 -delete
          find . -name "deep-forest-club-*.md5" -type f -mtime +30 -delete
          echo "🧹 Old backups cleaned up"
